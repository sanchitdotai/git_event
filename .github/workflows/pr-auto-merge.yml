name: Merge First 10 Collab PRs

on:
  pull_request:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: startsWith(github.event.pull_request.title, 'collab:')
    runs-on: ubuntu-latest

    steps:
      - name: Check if PR is in first 10
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          POSITION=$(gh pr list \
            --state open \
            --json number,title,createdAt \
            --jq '
              map(select(.title | startswith("collab:")))
              | sort_by(.createdAt)
              | map(.number)
              | index('${{ github.event.pull_request.number }}')
            ')

          if [ "$POSITION" != "null" ] && [ "$POSITION" -lt 10 ]; then
            echo "eligible=true" >> $GITHUB_OUTPUT
          else
            echo "eligible=false" >> $GITHUB_OUTPUT
          fi

      - name: Wait 10 seconds
        if: steps.check.outputs.eligible == 'true'
        run: sleep 10

      - name: Merge PR
        if: steps.check.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --delete-branch