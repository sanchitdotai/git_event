name: Auto Merge Collab PRs

on:
  pull_request:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: startsWith(github.event.pull_request.title, 'collab:')
    runs-on: ubuntu-latest

    steps:
      - name: Wait 10 seconds
        run: sleep 10

      - name: Merge PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --delete-branch \
            --repo ${{ github.repository }}